<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="internal_web">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ROS | Quản lý nhà hàng</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('bg_index.jpg');
      background-size: cover;
      background-position: center;
      background-color: #121212;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .loader-container {
      text-align: center;
      color: white;
      z-index: 9999;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .plate {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 4px solid #f39c12;
      border-top-color: transparent;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    .fork-knife {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .title {
      margin-top: 24px;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 3px;
      background: linear-gradient(90deg, #f39c12, #e33e1c);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      margin-top: 8px;
      font-size: 14px;
      color: #aaaaaa;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <!-- Stunning Restaurant Loading UI -->
  <div id="loading-indicator">
    <div class="loader-container">
      <div style="position: relative; display: inline-block;">
         <div class="plate"></div>
         <div class="fork-knife">🍽️</div>
      </div>
      <div class="title">ROS SYSTEM</div>
      <div class="subtitle">Đang chuẩn bị nhà bếp...</div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  
  <script>
    // Remove the loading UI once Flutter is ready
    window.addEventListener('load', function() {
      var observer = new MutationObserver(function(mutations) {
        for(var mutation of mutations) {
          if (mutation.addedNodes.length > 0) {
            for (var i = 0; i < mutation.addedNodes.length; i++) {
              if (mutation.addedNodes[i].tagName === 'FLUTTER-VIEW') {
                 var loader = document.getElementById('loading-indicator');
                 if (loader) {
                   loader.style.transition = 'opacity 0.6s ease';
                   loader.style.opacity = '0';
                   setTimeout(function(){ loader.remove(); }, 600);
                 }
                 observer.disconnect();
              }
            }
          }
        }
      });
      observer.observe(document.body, { childList: true });
    });
  </script>
</body>
</html>
