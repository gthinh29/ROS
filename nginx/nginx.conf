events {
    worker_connections 1024;
}

http {
    upstream api {
        server api:8000;
    }

    upstream customer_web {
        server customer_web:80;
    }

    upstream internal_web {
        server internal_web:80;
    }

    # ── Customer Web: http://localhost/ ───────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # API & WebSocket proxy — must come BEFORE the SPA fallback
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
        }

        # Direct API paths (for backward compat — Flutter apps call /orders, /menu, etc.)
        location ~ ^/(orders|menu|tables|reservations|payments|health|ws|auth|inventory|kds|users) {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
        }

        # Health-check endpoint (nginx itself)
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Customer Web SPA (Flutter)
        location / {
            proxy_pass http://customer_web;
            proxy_set_header Host $host;
        }
    }

    # ── Internal Web: http://localhost:8080/ ──────────────────────────────────
    server {
        listen 8080;
        server_name _;

        # Same API proxy (nhân viên cũng cần gọi API qua port 8080)
        location ~ ^/(orders|menu|tables|reservations|payments|health|ws|auth|inventory|kds|users) {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
        }

        # Internal Web SPA (Flutter)
        location / {
            proxy_pass http://internal_web;
            proxy_set_header Host $host;
        }
    }
}
